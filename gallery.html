<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CGS Works – Word Search</title>

<style>
body{
    margin:0;
    background:#0d0f14;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
    overflow:hidden;
}

#gameWrapper{
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:20px;
}

#counter{
    font-size:20px;
    letter-spacing:2px;
}

#grid{
    display:grid;
    grid-template-columns:repeat(10,50px);
    grid-template-rows:repeat(10,50px);
    gap:5px;
}

.cell{
    width:50px;
    height:50px;
    background:#151922;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    font-size:18px;
    cursor:pointer;
    user-select:none;
    border-radius:6px;
    transition:0.2s;
}

.cell.selected{
    background:#2e3b55;
}

.cell.found{
    background:#00b894;
    color:black;
}

#modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    display:none;
    align-items:center;
    justify-content:center;
}

#modalContent{
    background:#111;
    padding:40px;
    border-radius:20px;
    width:60%;
    max-width:600px;
    text-align:center;
    animation:pop 0.3s ease;
}

@keyframes pop{
    from{transform:scale(0.8);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

button{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="gameWrapper">
    <div id="counter">0 / 5 words found</div>
    <div id="grid"></div>
</div>

<div id="modal">
    <div id="modalContent">
        <h2 id="wordTitle"></h2>

        <!-- ===================================== -->
        <!--  🔥 ΕΔΩ ΞΕΚΙΝΑΕΙ ΤΟ CONTENT ΣΟΥ        -->
        <!--  Μπορείς να βάλεις κείμενο, εικόνες,   -->
        <!--  οτιδήποτε θες για κάθε project        -->
        <!-- ===================================== -->

        <p>Βάλε εδώ περιγραφή για το project.</p>
        <img src="" style="max-width:100%;margin-top:20px;border-radius:10px;">

        <!-- ===================================== -->
        <!--  🔥 ΕΔΩ ΤΕΛΕΙΩΝΕΙ ΤΟ CONTENT ΣΟΥ        -->
        <!-- ===================================== -->

        <button onclick="closeModal()">Close</button>
    </div>
</div>

<script>

const words = ["GRAPHIC","SKG","MUSIC","LIFE","DREAM"];
const gridSize = 10;
const gridElement = document.getElementById("grid");
const counter = document.getElementById("counter");

let foundWords = [];
let isSelecting = false;
let selectedCells = [];

const grid = Array(gridSize).fill().map(()=>Array(gridSize).fill(""));

function placeWord(word,row,col,dir){
    for(let i=0;i<word.length;i++){
        let r=row+(dir[0]*i);
        let c=col+(dir[1]*i);
        grid[r][c]=word[i];
    }
}

placeWord("GRAPHIC",0,0,[0,1]);     
placeWord("SKG",2,5,[1,0]);         
placeWord("MUSIC",4,2,[1,1]);       
placeWord("LIFE",9,0,[0,1]);        
placeWord("DREAM",1,9,[1,-1]);      

for(let r=0;r<gridSize;r++){
    for(let c=0;c<gridSize;c++){
        if(grid[r][c]===""){
            grid[r][c]=String.fromCharCode(65+Math.floor(Math.random()*26));
        }
    }
}

function renderGrid(){
    gridElement.innerHTML="";
    for(let r=0;r<gridSize;r++){
        for(let c=0;c<gridSize;c++){
            const cell=document.createElement("div");
            cell.classList.add("cell");
            cell.textContent=grid[r][c];
            cell.dataset.row=r;
            cell.dataset.col=c;

            cell.addEventListener("mousedown",startSelection);
            cell.addEventListener("mouseover",selecting);
            cell.addEventListener("mouseup",endSelection);

            gridElement.appendChild(cell);
        }
    }
}

function startSelection(e){
    isSelecting=true;
    selectedCells=[];
    e.target.classList.add("selected");
    selectedCells.push(e.target);
}

function selecting(e){
    if(!isSelecting) return;
    if(!selectedCells.includes(e.target)){
        e.target.classList.add("selected");
        selectedCells.push(e.target);
    }
}

function endSelection(){
    isSelecting=false;
    let word="";
    selectedCells.forEach(cell=>word+=cell.textContent);

    let reversed=word.split("").reverse().join("");

    if(words.includes(word) && !foundWords.includes(word)){
        markFound(word);
    }else if(words.includes(reversed) && !foundWords.includes(reversed)){
        markFound(reversed);
    }else{
        selectedCells.forEach(cell=>cell.classList.remove("selected"));
    }
}

function markFound(word){
    foundWords.push(word);
    selectedCells.forEach(cell=>{
        cell.classList.remove("selected");
        cell.classList.add("found");
    });

    counter.textContent=`${foundWords.length} / ${words.length} words found`;

    showModal(word);
}

function showModal(word){
    document.getElementById("wordTitle").textContent=word;
    document.getElementById("modal").style.display="flex";
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

renderGrid();

</script>

</body>
</html>
